name: Merge
run-name: ${{ github.actor }} pushed to master
on:
  push:
    branches:
      - main
  
jobs:
  Deploy-Eusphere:
    name: Deploy / eusphere.co
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Release
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          cd eusphere-co
          ./release/prod.sh

  Deploy-Monarchy:
    name: Deploy / monarchy1.com
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Release
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          cd monarchy-com
          ./release/prod.sh
