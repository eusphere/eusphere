name: Merge
run-name: ${{ github.actor }} pushed to master
on:
  push:
    branches:
      - main
  
jobs:
  Changes:
    name: Change detection
    runs-on: ubuntu-latest
    outputs:
      eusphere: ${{ steps.filter.outputs.eusphere }}
      monarchy: ${{ steps.filter.outputs.monarchy }}
      connieadu: ${{ steps.filter.outputs.connieadu }}
    steps:
      - name: Cloning source
        uses: actions/checkout@v4
      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            eusphere:
              - 'eusphere-co/**'
            monarchy:
              - 'monarchy-com/**'
            connieadu:
              - 'connieadu-com/**'

  Deploy-Eusphere:
    name: Deploy / eusphere.co
    needs: Changes
    if: needs.Changes.outputs.eusphere == 'true'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Cloning source
        uses: actions/checkout@v4
      - name: Release
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          cd eusphere-co
          ./release/prod.sh

  Deploy-Monarchy:
    name: Deploy / monarchy1.com
    needs: Changes
    if: needs.Changes.outputs.monarchy == 'true'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Cloning source
        uses: actions/checkout@v4
      - name: Release
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          cd monarchy-com
          ./release/prod.sh

  Deploy-Connieadu:
    name: Deploy / connieadu.com
    needs: Changes
    if: needs.Changes.outputs.connieadu == 'true'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Cloning source
        uses: actions/checkout@v4
      - name: Release
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          cd connieadu-com
          ./release/prod.sh
